<app-header />
<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user 
          [user]="user" 
          (select)="onSelectUserAppComponent($event)"
          />
      </li>
    }
  </ul>
  @if (selectedUserId) {
    <app-tasks [name]="selectedUser.name" />
  } @else {
    <p id="fallback">Please select a user to view their tasks.</p>
  }
</main>
